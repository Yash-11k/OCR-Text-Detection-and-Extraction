<!DOCTYPE html>
<html>

<head>

    <title>OCR Text Detection</title>

    <style>

        body{

            font-family:Arial;
            width:700px;
            margin:auto;
            margin-top:50px;

        }

        textarea{

            width:100%;
            height:300px;
            font-size:16px;

        }

        button{

            padding:10px 20px;
            font-size:16px;

        }

    </style>

</head>

<body>

<h1>Text Detection using OCR</h1>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">

Extract Text

</button>

</form>

<br>

<h2>Extracted Text</h2>

<textarea readonly>{{ text }}</textarea>

</body>

</html>
